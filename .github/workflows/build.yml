name: Run Telegram Bot Every 30 Min

on:
  schedule:
    # Каждые 30 минут с 7:00 до 23:00 KGZ
    - cron: '0,30 1-17 * * *'
  
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore
      run: dotnet restore
      working-directory: ./Dayvis_bot
    
    - name: Build
      run: dotnet build --no-restore -c Release
      working-directory: ./Dayvis_bot
    
    - name: Run
      run: dotnet run -c Release
      working-directory: ./Dayvis_bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
